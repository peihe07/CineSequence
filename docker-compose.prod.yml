name: cinesequence-prod

services:
  # ---- Infrastructure ----
  postgres:
    container_name: cinesequence-postgres-prod
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    container_name: cinesequence-redis-prod
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Backend ----
  backend:
    container_name: cinesequence-backend-prod
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: prod
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---- Celery Worker ----
  celery-worker:
    container_name: cinesequence-celery-prod
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: prod
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    container_name: cinesequence-beat-prod
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: prod
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---- Frontend ----
  frontend:
    container_name: cinesequence-frontend-prod
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        API_PROXY_TARGET: ${API_PROXY_TARGET}
        ENVIRONMENT: ${ENVIRONMENT}
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      - backend
    restart: unless-stopped

  # ---- Monitoring ----
  prometheus:
    container_name: cinesequence-prometheus-prod
    image: prom/prometheus:v2.53.0
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
    restart: unless-stopped

  grafana:
    container_name: cinesequence-grafana-prod
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3001}
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
