name: cinesequence-prod

services:
  # ---- Infrastructure ----
  postgres:
    container_name: cinesequence-postgres-prod
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    container_name: cinesequence-redis-prod
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Backend ----
  backend:
    container_name: cinesequence-backend-prod
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: prod
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---- Frontend ----
  frontend:
    container_name: cinesequence-frontend-prod
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: prod
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
