name: cinesequence-dev

services:
  # ---- Infrastructure ----
  postgres:
    container_name: cinesequence-postgres-dev
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cinesequence
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d cinesequence"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: cinesequence-redis-dev
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Backend ----
  backend:
    container_name: cinesequence-backend-dev
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://dev:dev@postgres:5432/cinesequence
      - REDIS_URL=redis://redis:6379/0
      - MATCH_THRESHOLD=0.5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Celery Worker ----
  celery-worker:
    container_name: cinesequence-celery-dev
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: dev
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://dev:dev@postgres:5432/cinesequence
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    container_name: cinesequence-beat-dev
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: dev
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy

  # ---- Frontend ----
  frontend:
    container_name: cinesequence-frontend-dev
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  pgdata:
