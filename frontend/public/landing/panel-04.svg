<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" fill="none">
  <rect width="800" height="1200" fill="url(#bg4)"/>
  <!-- Constellation network — matching visualization -->
  <!-- Connection lines -->
  <g opacity=".15">
    <line x1="400" y1="380" x2="240" y2="520" stroke="#FFD090" stroke-width="1.5"/>
    <line x1="400" y1="380" x2="560" y2="500" stroke="#FFD090" stroke-width="1.5"/>
    <line x1="400" y1="380" x2="340" y2="260" stroke="#FFD090" stroke-width="1"/>
    <line x1="400" y1="380" x2="520" y2="280" stroke="#FFD090" stroke-width="1"/>
    <line x1="240" y1="520" x2="180" y2="680" stroke="#FFD090" stroke-width="1"/>
    <line x1="240" y1="520" x2="360" y2="640" stroke="#FFD090" stroke-width="1"/>
    <line x1="560" y1="500" x2="620" y2="660" stroke="#FFD090" stroke-width="1"/>
    <line x1="560" y1="500" x2="440" y2="620" stroke="#FFD090" stroke-width="1"/>
    <line x1="360" y1="640" x2="440" y2="620" stroke="#FFD090" stroke-width="1.5" opacity="2"/>
    <line x1="180" y1="680" x2="280" y2="800" stroke="#FFD090" stroke-width="1"/>
    <line x1="620" y1="660" x2="520" y2="800" stroke="#FFD090" stroke-width="1"/>
  </g>
  <!-- Central user node -->
  <circle cx="400" cy="380" r="24" fill="url(#centralNode)" opacity=".9"/>
  <circle cx="400" cy="380" r="12" fill="#FFF0D8" opacity=".8"/>
  <circle cx="400" cy="380" r="48" stroke="#FFD090" stroke-width="1" opacity=".15"/>
  <circle cx="400" cy="380" r="80" stroke="#FFD090" stroke-width=".5" opacity=".08" stroke-dasharray="4 6"/>
  <!-- Matched pair nodes -->
  <circle cx="240" cy="520" r="16" fill="url(#matchNode)" opacity=".7"/>
  <circle cx="240" cy="520" r="7" fill="#FFE8C0" opacity=".6"/>
  <circle cx="560" cy="500" r="16" fill="url(#matchNode)" opacity=".7"/>
  <circle cx="560" cy="500" r="7" fill="#FFE8C0" opacity=".6"/>
  <!-- Secondary nodes -->
  <circle cx="340" cy="260" r="8" fill="url(#secNode)" opacity=".5"/>
  <circle cx="520" cy="280" r="10" fill="url(#secNode)" opacity=".5"/>
  <circle cx="180" cy="680" r="10" fill="url(#secNode)" opacity=".4"/>
  <circle cx="620" cy="660" r="8" fill="url(#secNode)" opacity=".4"/>
  <circle cx="360" cy="640" r="12" fill="url(#secNode)" opacity=".5"/>
  <circle cx="440" cy="620" r="12" fill="url(#secNode)" opacity=".5"/>
  <circle cx="280" cy="800" r="6" fill="url(#secNode)" opacity=".3"/>
  <circle cx="520" cy="800" r="6" fill="url(#secNode)" opacity=".3"/>
  <!-- Match pulse ring -->
  <circle cx="400" cy="380" r="140" stroke="#FFD090" stroke-width=".8" opacity=".06" stroke-dasharray="8 12"/>
  <!-- Highlight arc between matched pair -->
  <path d="M240 520 Q400 420, 560 500" stroke="url(#matchArc)" stroke-width="2" fill="none" opacity=".25"/>
  <!-- Scattered stars -->
  <g opacity=".06">
    <circle cx="120" cy="200" r="1.5" fill="#FFF"/>
    <circle cx="680" cy="180" r="1" fill="#FFF"/>
    <circle cx="100" cy="900" r="1.2" fill="#FFF"/>
    <circle cx="700" cy="880" r="1.5" fill="#FFF"/>
    <circle cx="300" cy="1000" r="1" fill="#FFF"/>
    <circle cx="500" cy="1020" r="1.3" fill="#FFF"/>
    <circle cx="150" cy="400" r="1" fill="#FFF"/>
    <circle cx="650" cy="350" r="1.2" fill="#FFF"/>
  </g>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="800" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#120C06"/>
      <stop offset=".35" stop-color="#2A1C0C"/>
      <stop offset=".7" stop-color="#1A1208"/>
      <stop offset="1" stop-color="#080604"/>
    </linearGradient>
    <radialGradient id="centralNode" cx="400" cy="380" r="24" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0D8"/>
      <stop offset=".4" stop-color="#E0A850" stop-opacity=".6"/>
      <stop offset="1" stop-color="#805020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="matchNode" cx=".5" cy=".5" r=".5">
      <stop stop-color="#FFE0B0"/>
      <stop offset=".5" stop-color="#C08830" stop-opacity=".5"/>
      <stop offset="1" stop-color="#805020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="secNode" cx=".5" cy=".5" r=".5">
      <stop stop-color="#FFD8A0"/>
      <stop offset=".6" stop-color="#A07030" stop-opacity=".3"/>
      <stop offset="1" stop-color="#604020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="matchArc" x1="240" y1="520" x2="560" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD090"/>
      <stop offset=".5" stop-color="#FFE8C0"/>
      <stop offset="1" stop-color="#FFD090"/>
    </linearGradient>
  </defs>
</svg>
