name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://dev:dev@localhost:5432/cinesequence
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      FRONTEND_URL: http://127.0.0.1:3000
      API_URL: http://127.0.0.1:8000
      ENVIRONMENT: test
      JWT_SECRET: test-jwt-secret
      MAGIC_LINK_SECRET: test-magic-link-secret
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install PostgreSQL and pgvector
        working-directory: .
        run: |
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get update
          sudo apt-get install -y postgresql-16 postgresql-16-pgvector redis-server

      - name: Start PostgreSQL
        working-directory: .
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER dev WITH PASSWORD 'dev';" || true
          sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname = 'cinesequence'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE DATABASE cinesequence OWNER dev;"
          pg_isready -h localhost -p 5432 -U postgres

      - name: Start Redis
        working-directory: .
        run: |
          sudo systemctl start redis-server
          redis-cli ping

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Install dev tools
        run: pip install ruff

      - name: Lint
        run: ruff check .

      - name: DB migration
        run: alembic upgrade head

      - name: Seed default groups
        run: python scripts/seed_groups.py

      - name: Tests
        run: pytest tests -v
